name: Publish NuGet packages

on:
   push:
      branches: [ "main" ]
      paths: [ "src/**" ]
   workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04 #ubuntu-latest doesnt work at the moment, see: https://github.com/NuGet/setup-nuget/issues/168

    steps:
      - uses: actions/checkout@v4

      - name: Setup NuGet.exe for use with actions
        uses: nuget/setup-nuget@v2
        with:
          nuget-api-key: ${{secrets.NUGET_API_KEY}}
          nuget-version: 'latest'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Tests
        run: dotnet test --no-build --verbosity normal

      - name: Push package
        run: nuget push **/*.nupkg -Source 'https://api.nuget.org/v3/index.json' -NonInteractive -SkipDuplicate -Verbosity normal

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep -oPm1 "(?<=<Version>)[^<]+" src/mvdmio.ASP.Jobs/mvdmio.ASP.Jobs.csproj)
          TAG="v$VERSION"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
          else
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
